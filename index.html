<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>강진, 설렘이 머무는 곳</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    },
                    colors: {
                        brandBg: '#FFF9F5',
                        brandPoint: '#c88661', /* 차분한 브라운/오렌지 톤 */
                    },
                    borderRadius: {
                        '2xl': '20px',
                    }
                }
            }
        }
    </script>

    <style>
        /* 가로 스크롤바 숨기기 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        body {
            background-color: #f3f4f6; /* 바탕 배경색 (PC에서 모바일 뷰 돋보이게) */
        }
        
        .mobile-container {
            background-color: #FFF9F5;
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding-bottom: 80px; /* 하단 네비게이션 여백 */
            overflow-x: hidden;
        }
    </style>
</head>
<body class="text-gray-900 font-sans">

<div class="mobile-container">
    
    <header class="flex justify-between items-start px-5 pt-12 pb-4">
        <div>
            <h1 class="text-2xl font-semibold leading-tight">강진,<br><span class="text-[17px] font-normal text-gray-600">설렘이 머무는 곳</span></h1>
        </div>
        <div class="flex gap-4 pt-1">
            <button class="text-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            </button>
            <button class="text-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
    </header>

    <div class="px-5 mb-6">
        <div class="relative">
            <input type="text" placeholder="어디로 떠나볼까요?" class="w-full bg-white rounded-full py-3 pl-5 pr-12 text-sm shadow-sm focus:outline-none border border-gray-100">
            <button class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
        </div>
    </div>

    <div class="px-5 mb-8">
        <div class="relative w-full h-48 rounded-[20px] overflow-hidden shadow-sm">
            <img src="https://images.unsplash.com/photo-1542308722-e42319c5c165?auto=format&fit=crop&w=800&q=80" alt="강진 노을" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-r from-black/40 to-transparent"></div>
            <div class="absolute top-6 left-5 text-white">
                <h2 class="text-2xl font-medium tracking-wide mb-1" style="font-family: 'Georgia', serif; font-style: italic;">천천히, 강진을</h2>
                <h2 class="text-2xl font-medium tracking-wide" style="font-family: 'Georgia', serif; font-style: italic;">느껴보세요</h2>
            </div>
        </div>
    </div>

    <div class="px-7 mb-10 flex justify-between">
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="w-14 h-14 rounded-full border border-brandPoint/30 flex items-center justify-center bg-[#fdf5f0]">
                <span class="text-xl">🍚</span>
            </div>
            <span class="text-xs font-medium text-gray-700">맛집</span>
        </div>
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="w-14 h-14 rounded-full border border-brandPoint/30 flex items-center justify-center bg-[#fdf5f0]">
                <span class="text-xl">☕</span>
            </div>
            <span class="text-xs font-medium text-gray-700">카페</span>
        </div>
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="w-14 h-14 rounded-full border border-brandPoint/30 flex items-center justify-center bg-[#fdf5f0]">
                <span class="text-xl">⛩️</span>
            </div>
            <span class="text-xs font-medium text-gray-700">관광지</span>
        </div>
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="w-14 h-14 rounded-full border border-brandPoint/30 flex items-center justify-center bg-[#fdf5f0]">
                <span class="text-xl">🎨</span>
            </div>
            <span class="text-xs font-medium text-gray-700">체험</span>
        </div>
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="w-14 h-14 rounded-full border border-brandPoint/30 flex items-center justify-center bg-[#fdf5f0]">
                <span class="text-xl">🛏️</span>
            </div>
            <span class="text-xs font-medium text-gray-700">숙소</span>
        </div>
    </div>

    <div class="pl-5 mb-10">
        <div class="flex justify-between items-end pr-5 mb-4">
            <h2 class="text-lg font-bold">상황별 추천</h2>
            <button class="text-xs text-gray-400 flex items-center">더보기 <svg class="w-3 h-3 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
        </div>
        <div class="flex gap-3 overflow-x-auto hide-scrollbar pr-5 pb-2">
            <div class="relative flex-shrink-0 w-28 h-36 rounded-[16px] overflow-hidden shadow-sm">
                <img src="https://images.unsplash.com/photo-1513622470522-26c308a908f7?auto=format&fit=crop&w=300&q=80" alt="늦게까지 하는 곳" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40"></div>
                <div class="absolute inset-0 flex flex-col justify-center items-center text-white text-center p-2">
                    <span class="text-sm font-semibold mb-2 leading-tight">늦게까지<br>하는 곳</span>
                    <span class="text-lg">🌙</span>
                </div>
            </div>
            <div class="relative flex-shrink-0 w-28 h-36 rounded-[16px] overflow-hidden shadow-sm">
                <img src="https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?auto=format&fit=crop&w=300&q=80" alt="비 오는 날" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40"></div>
                <div class="absolute inset-0 flex flex-col justify-center items-center text-white text-center p-2">
                    <span class="text-sm font-semibold mb-2 leading-tight">비 오는 날<br>가볼 만한 곳</span>
                    <span class="text-lg">☂️</span>
                </div>
            </div>
            <div class="relative flex-shrink-0 w-28 h-36 rounded-[16px] overflow-hidden shadow-sm">
                <img src="https://images.unsplash.com/photo-1502086223501-7ea6ecd79368?auto=format&fit=crop&w=300&q=80" alt="아이와 함께" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40"></div>
                <div class="absolute inset-0 flex flex-col justify-center items-center text-white text-center p-2">
                    <span class="text-sm font-semibold mb-2 leading-tight">아이와 함께<br>추억</span>
                    <span class="text-lg">👨‍👩‍👧</span>
                </div>
            </div>
        </div>
    </div>

    <div class="pl-5 mb-10">
        <h2 class="text-lg font-bold mb-4 pr-5">지금 많이 저장한 곳</h2>
        <div id="most-saved-container" class="flex gap-4 overflow-x-auto hide-scrollbar pr-5 pb-2">
            <div class="text-sm text-gray-400 py-10 w-full text-center animate-pulse">데이터를 불러오는 중입니다...</div>
        </div>
    </div>

    <div class="px-5 mb-10">
        <h2 class="text-lg font-bold mb-4">오늘의 강진</h2>
        <div class="bg-white rounded-[20px] p-4 flex gap-4 shadow-[0_2px_10px_rgba(0,0,0,0.03)] items-center">
            <div class="w-24 h-24 rounded-[12px] overflow-hidden flex-shrink-0">
                <img src="https://images.unsplash.com/photo-1601625463654-a69b596e1ccb?auto=format&fit=crop&w=300&q=80" alt="백련사" class="w-full h-full object-cover">
            </div>
            <div>
                <h3 class="font-bold text-[15px] leading-snug mb-2 text-gray-800">다산 정약용의 발자취를<br>따라 걷는 하루</h3>
                <p class="text-[11px] text-gray-400">#역사여행 #다산초당 #백련사</p>
            </div>
        </div>
    </div>

    <nav class="absolute bottom-0 w-full bg-white border-t border-gray-100 rounded-t-[20px] flex justify-between items-center px-6 py-4 pb-safe shadow-[0_-5px_15px_rgba(0,0,0,0.02)] z-50">
        <div class="flex flex-col items-center text-brandPoint">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-medium">홈</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <span class="text-[10px] font-medium">탐색</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
            <span class="text-[10px] font-medium">저장</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] font-medium">지도</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
            <span class="text-[10px] font-medium">더보기</span>
        </div>
    </nav>
</div>

<script>
    // ★ 여기에 3단계에서 복사한 구글 앱스 스크립트 URL을 붙여넣으세요.
    const API_URL = "https://script.google.com/macros/s/AKfycbxbbGWhRczTGU-LUbbwTcCcCoDixyBLz8G2dsNCzwM6i3hlXdy5aXCa1U5GBvg7nNxAhQ/exec"; 

    // 카드를 그리는 함수
    function renderCards(dataArray) {
        const container = document.getElementById('most-saved-container');
        container.innerHTML = ''; // 로딩 텍스트 제거

        dataArray.forEach(item => {
            // 카테고리명 변환 (데이터에 따라 유동적으로 수정 가능)
            let catName = "명소";
            if(item.CategoryID === "CAFE") catName = "카페";
            if(item.CategoryID === "FOOD") catName = "맛집";
            if(item.CategoryID === "TRAVEL") catName = "관광지";

            // 주소에서 읍/면 추출 (예: 전남 강진군 성전면 -> 성전면)
            let location = item.Address ? item.Address.split(' ')[2] : "";
            
            // 이미지 주소 (데이터에 이미지가 없으면 임시 이미지 사용)
            let imageUrl = item.CoverImage || "https://images.unsplash.com/photo-1542314831-c6a421192e21?auto=format&fit=crop&w=300&q=80";

            const cardHTML = `
                <div class="flex-shrink-0 w-32 cursor-pointer">
                    <div class="relative w-full h-32 rounded-[20px] overflow-hidden mb-2 shadow-sm">
                        <img src="${imageUrl}" alt="${item.Title}" class="w-full h-full object-cover">
                        <div class="absolute top-2 right-2 bg-white/30 backdrop-blur-sm rounded-full p-1.5">
                            <svg class="w-3.5 h-3.5 text-white fill-current" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </div>
                    </div>
                    <h3 class="font-bold text-[14px] text-gray-800 truncate">${item.Title || '이름 없음'}</h3>
                    <p class="text-[11px] text-gray-500 truncate">${catName} · ${location}</p>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', cardHTML);
        });
    }

    // 데이터를 가져오는 비동기 함수
    async function fetchData() {
        try {
            // API_URL이 기본값일 경우 시각적 확인을 위해 더미 데이터 렌더링
            if(API_URL === "여기에_구글스크립트_URL_입력" || API_URL === "") {
                const dummyData = [
                    { Title: "가우도 출렁다리", CategoryID: "TRAVEL", Address: "전남 강진군 도암면", CoverImage: "https://images.unsplash.com/photo-1506501139174-099022df5260?auto=format&fit=crop&w=300&q=80" },
                    { Title: "강진 불금불파스타", CategoryID: "FOOD", Address: "전남 강진군 강진읍", CoverImage: "https://images.unsplash.com/photo-1473093295043-cdd812d0e601?auto=format&fit=crop&w=300&q=80" },
                    { Title: "호수의 하루", CategoryID: "CAFE", Address: "전남 강진군 성전면", CoverImage: "https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&w=300&q=80" }
                ];
                renderCards(dummyData);
                return;
            }

            const response = await fetch(API_URL);
            const data = await response.json();
            
            // Content 시트의 데이터를 배열로 가져옴
            if(data && data.Content) {
                // Published 상태인 것만 필터링
                const publishedContent = data.Content.filter(item => item.Status === 'Published');
                renderCards(publishedContent);
            }
        } catch (error) {
            console.error("데이터를 불러오는 중 오류가 발생했습니다:", error);
            document.getElementById('most-saved-container').innerHTML = '<div class="text-sm text-red-400 py-5 w-full text-center">데이터를 불러오지 못했습니다.</div>';
        }
    }

    // 페이지 로드 시 실행
    document.addEventListener('DOMContentLoaded', fetchData);
</script>
</body>
</html>
